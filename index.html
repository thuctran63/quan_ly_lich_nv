<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHÙNG NỒNG — Bảng điều phối lịch nhân viên</title>
  </head>
  <body>
    <header class="header">
      <h1>PHÙNG NỒNG</h1>
      <p class="subtitle">BẢNG ĐIỀU PHỐI LỊCH NHÂN VIÊN</p>
      <p class="date-line">Hôm nay: <strong id="current-date"></strong></p>
    </header>

    <nav class="nav-tabs">
      <button type="button" class="nav-tab nav-tab--active" data-tab="employees">
        Quản lý nhân viên
      </button>
      <button type="button" class="nav-tab" data-tab="schedule">Lập lịch</button>
    </nav>

    <main class="layout">
      <!-- Tab 1: Nhân viên CRUD -->
      <section id="tab-employees" class="tab-panel tab-panel--active">
        <div class="employees-layout">
          <div class="card">
            <h2 id="employee-form-title">Thêm nhân viên</h2>
            <form id="employee-form" class="employee-form">
              <label>
                Tên nhân viên
                <input
                  type="text"
                  id="employee-name-input"
                  placeholder="Ví dụ: Nguyễn Văn A"
                  required
                />
              </label>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="employee-submit">
                  Thêm nhân viên
                </button>
                <button type="button" class="btn btn-secondary" id="employee-cancel" hidden>
                  Hủy
                </button>
              </div>
            </form>
            <p id="employee-error" class="error" hidden></p>
          </div>

          <div class="card">
            <h2>Danh sách nhân viên (<span id="employee-count">0</span>)</h2>
            <div id="employee-list" class="employee-list">
              <p class="empty">Chưa có nhân viên nào.</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Tab 2: Lập lịch + timeline -->
      <section id="tab-schedule" class="tab-panel" hidden>
        <section class="gantt-panel card">
          <div class="gantt-panel-head">
            <h2>Bảng điều phối lịch</h2>
            <div id="legend" class="legend"></div>
          </div>
          <div id="timeline" class="gantt">
            <p class="empty">Thêm nhân viên ở tab Quản lý để hiển thị timeline.</p>
          </div>
        </section>

        <div class="schedule-layout">
          <div class="card">
            <h2>Gán lịch</h2>
            <form id="assignment-form">
              <label>
                Nhân viên
                <select id="employee-select" required>
                  <option value="">— Chọn nhân viên —</option>
                </select>
              </label>
              <div class="time-row">
                <label>
                  Bắt đầu
                  <input type="time" id="start-time" required />
                </label>
                <label>
                  Kết thúc
                  <input type="time" id="end-time" required />
                </label>
              </div>
              <label>
                Công việc
                <input
                  type="text"
                  id="task-input"
                  placeholder="Mô tả việc đang làm"
                  required
                />
              </label>
              <button type="submit" class="btn btn-primary">Cập nhật</button>
            </form>
            <p id="form-error" class="error" hidden></p>
          </div>

          <div class="card">
            <h2>Lịch đã gán</h2>
            <div id="assignment-list" class="assignment-list">
              <p class="empty">Chưa có lịch nào.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
